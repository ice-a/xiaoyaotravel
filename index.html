<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅伴手册 3.2</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8097273255284826"
    crossorigin="anonymous"></script>
    <script defer src="https://count.020417.xyz/script.js" data-website-id="52e6dac5-f235-4fed-bde8-045fca43edc1"></script>
  <style>
    :root {
      --bg: #f5efe4;
      --panel: #fffaf2;
      --ink: #1e2a2f;
      --muted: #5e6f77;
      --line: rgba(30, 42, 47, 0.14);
      --primary: #174e63;
      --accent: #c66a43;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 0 0, rgba(198, 106, 67, 0.15), transparent 33%),
                  radial-gradient(circle at 100% 0, rgba(23, 78, 99, 0.15), transparent 30%),
                  var(--bg);
    }
    .app {
      width: min(1300px, calc(100% - 24px));
      margin: 12px auto;
      display: grid;
      gap: 10px;
    }
    .card {
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 16px;
      background: rgba(255, 250, 242, 0.88);
      box-shadow: 0 18px 36px rgba(18, 30, 35, 0.12);
      backdrop-filter: blur(10px);
    }
    .top {
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .top-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .brand {
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 7px rgba(198, 106, 67, 0.15);
    }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      border: 1px solid rgba(23, 78, 99, 0.24);
      border-radius: 999px;
      padding: 4px 10px;
      background: #fff;
      color: #1d5f72;
      font-weight: 700;
      font-size: 12px;
    }
    .history { border: 1px solid var(--line); border-radius: 12px; background: rgba(255, 255, 255, 0.8); padding: 8px; display: grid; gap: 8px; }
    .history-bar { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: center; }
    .input, select {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 11px;
      font: inherit;
      background: #fff;
      color: var(--ink);
      width: 100%;
    }
    .count { font-size: 12px; color: var(--muted); font-weight: 700; }
    .toggle, .btn {
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
    }
    .toggle { border: 1px solid var(--line); background: #fff; }
    .strip { display: flex; gap: 8px; overflow: auto; }
    .item {
      min-width: 230px;
      max-width: 270px;
      border: 1px solid rgba(23, 78, 99, 0.2);
      border-radius: 12px;
      background: #fff;
      padding: 8px;
      display: grid;
      gap: 4px;
      cursor: pointer;
    }
    .item.active { border-color: rgba(23, 78, 99, 0.55); }
    .ihead { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .ikey { font-size: 13px; font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .idel {
      border: 1px solid rgba(177, 53, 24, 0.35);
      border-radius: 999px;
      font-size: 11px;
      padding: 3px 8px;
      color: #9e2f1a;
      background: rgba(177, 53, 24, 0.07);
      cursor: pointer;
    }
    .isub { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .work { display: grid; grid-template-columns: minmax(340px, 400px) minmax(0, 1fr); gap: 10px; min-height: 0; }
    .left { min-height: 0; }
    .form { padding: 12px; display: grid; gap: 10px; }
    .form h2 { margin: 0; }
    .help, .sub { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.55; }
    .fg { display: grid; gap: 10px; }
    label { display: grid; gap: 6px; font-size: 14px; font-weight: 700; }
    .btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn.p { border: none; color: #fff; background: linear-gradient(145deg, #1a2a31, #36505a); }
    .btn.s { border: 1px solid var(--line); background: #fff; }
    .status { min-height: 20px; font-size: 13px; color: var(--muted); }
    .status.err { color: #b13518; }
    .route-panel { padding: 12px; display: grid; gap: 10px; min-height: 360px; }
    .route-panel h3 { margin: 0; font-size: 18px; }
    .route-panel-body { display: grid; gap: 8px; }
    .route-day { border: 1px solid rgba(23,35,40,.12); border-radius: 10px; background: rgba(255,255,255,.92); padding: 8px; display: grid; gap: 6px; }
    .route-day.active { border-color: rgba(23,78,99,.6); box-shadow: inset 0 0 0 1px rgba(23,78,99,.24); background: #fff; }
    .route-day-head { font-size: 13px; font-weight: 800; }
    .route-step { border: 1px solid rgba(23,35,40,.08); border-radius: 8px; background: rgba(245,239,228,.62); padding: 7px 8px; display: grid; gap: 4px; }
    .route-step-top { font-size: 13px; }
    .transport-tag { display: inline-flex; align-items: center; border-radius: 999px; font-size: 11px; padding: 2px 8px; font-weight: 700; }
    .t-metro { background: #e7f0ff; color: #2f5fa8; border: 1px solid #b8cdf5; }
    .t-bus { background: #e8f6eb; color: #2f7b43; border: 1px solid #bfe4c8; }
    .t-taxi { background: #fff4e4; color: #9a5f11; border: 1px solid #f1d0a3; }
    .t-walk { background: #f1f0f8; color: #5b4da1; border: 1px solid #d3cfee; }
    .t-train { background: #e9f8f8; color: #0f6f6a; border: 1px solid #bce4e2; }
    .t-other { background: #f1f3f5; color: #4d5a63; border: 1px solid #d6dde2; }
    .ad-wrap { border-top: 1px solid rgba(23,35,40,.08); padding-top: 8px; margin-top: 2px; min-height: 120px; display: grid; gap: 8px; }
    .ad-fallback { display: none; border: 1px dashed rgba(23,78,99,.28); border-radius: 8px; padding: 10px; color: var(--muted); font-size: 12px; background: rgba(255,255,255,.7); }
    .ad-fallback.show { display: block; }

    .scroll { min-height: 0; overflow: auto; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.75); background: rgba(255, 250, 242, 0.7); box-shadow: 0 18px 36px rgba(18,30,35,0.12); padding: 10px; }
    .guide { padding: 10px; border-radius: 12px; background: linear-gradient(160deg, rgba(255,255,255,.7), rgba(255,247,236,.9)); }
    .shell { border: 1px solid rgba(23,35,40,.08); border-radius: 14px; padding: 10px; background: #f8f4ec; display: grid; gap: 8px; }
    .ban { display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .badge { font-size: 12px; font-weight: 800; border: 1px solid rgba(23,78,99,.3); border-radius: 999px; padding: 4px 10px; background: #fff; color: #1f5f74; }
    .layout { display: grid; gap: 8px; }
    .gcard { border: 1px solid rgba(23,35,40,.08); border-radius: 12px; background: rgba(255,255,255,.92); padding: 10px; }
    .title { margin: 8px 0 0; font-size: clamp(1.35rem, 2.8vw, 1.95rem); line-height: 1.2; }
    .tags { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 8px; }
    .tag { font-size: 12px; font-weight: 700; border: 1px solid rgba(23,78,99,.24); border-radius: 999px; background: rgba(23,78,99,.08); padding: 4px 9px; }
    .g2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 8px; }
    .mini { border: 1px solid rgba(23,35,40,.08); border-radius: 10px; background: rgba(255,255,255,.9); padding: 9px; }
    .mini h4 { margin: 0; font-size: 14px; }
    .mini p, .mini li { margin: 6px 0 0; color: var(--muted); font-size: 13px; line-height: 1.55; }
    .mini ul { margin: 6px 0 0; padding-left: 18px; }

    .days { display: grid; gap: 8px; }
    .day { border: 1px solid rgba(23,35,40,.08); border-radius: 10px; background: rgba(255,255,255,.9); padding: 9px; }
    .day h4 { margin: 0 0 8px; font-size: 15px; }
    .sch { display: grid; gap: 6px; }
    .slot { display: grid; grid-template-columns: 66px 1fr; gap: 7px; border: 1px solid rgba(23,35,40,.06); border-radius: 9px; background: rgba(244,238,227,.74); padding: 6px 8px; font-size: 13px; }

    .bud { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
    .bud strong { display: block; margin-top: 5px; font-size: 1.05rem; }

    .empty { padding: 28px; text-align: center; }
    .reveal { opacity: 0; transform: translateY(14px); transition: opacity .5s ease, transform .5s ease; transition-delay: var(--d, 0ms); }
    .reveal.on { opacity: 1; transform: translateY(0); }

    @media (max-width: 1100px) {
      .work { grid-template-columns: 1fr; }
      .scroll { min-height: 440px; max-height: 68vh; }
    }
    @media (max-width: 840px) {
      .history-bar { grid-template-columns: 1fr auto; }
      .count { grid-column: 1 / -1; }
      .g2, .bud { grid-template-columns: 1fr; }
      .slot { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header id="nav" class="card top">
      <div class="top-head">
        <div class="brand"><span class="dot"></span><span>旅伴手册 3.2</span></div>
        <div class="chips">
          <span class="chip">路线可视化</span>
          <span class="chip">交通链路生成</span>
          <span class="chip">1分钟无操作轮播</span>
        </div>
      </div>

      <div id="hnav" class="history">
        <div class="history-bar">
          <input id="hsearch" class="input" placeholder="按地点搜索历史（无需密码）" />
          <div id="hcount" class="count">0 条</div>
          <button id="htoggle" class="toggle" type="button">折叠历史</button>
        </div>
        <div id="hstrip" class="strip"></div>
      </div>
    </header>

    <section class="work">
      <aside class="left">
        <section class="card form">
          <h2>生成旅游攻略</h2>
          <p class="help">输入地点与天数，系统先查 Mongo 缓存，未命中才调用模型生成并保存。</p>
          <form id="form" class="fg">
            <label>旅游地点
              <input id="location" class="input" required placeholder="例如：南沙、成都、东京" />
            </label>
            <label>游玩天数
              <select id="days" class="input">
                <option value="1">1 天</option>
                <option value="2" selected>2 天</option>
                <option value="3">3 天</option>
                <option value="4">4 天</option>
                <option value="5">5 天</option>
                <option value="6">6 天</option>
                <option value="7">7 天</option>
              </select>
            </label>
            <div class="btns">
              <button id="submit" class="btn p" type="submit">生成并保存</button>
              <button id="refresh" class="btn s" type="button">刷新历史</button>
            </div>
          </form>
          <div id="status" class="status"></div>
          <p class="help">删除历史需输入服务端配置的 <code>DELETE_PASSWORD</code>。</p>
        </section>
        <section class="card route-panel">
          <h3>路线可视化</h3>
          <p class="help">点击右侧“每日行程”的某一天，此处同步高亮对应路线；不同交通方式使用不同颜色。</p>
          <div id="route-panel-body" class="route-panel-body">
            <p class="sub">还没有路线数据。</p>
          </div>
          <div class="ad-wrap">
            <ins class="adsbygoogle"
              id="left-route-ad"
              style="display:block"
              data-ad-client="ca-pub-8097273255284826"
              data-ad-slot="6587178009"
              data-ad-format="auto"
              data-full-width-responsive="true"></ins>
            <div id="left-route-ad-fallback" class="ad-fallback">广告位招商中</div>
          </div>
        </section>
      </aside>

      <div id="scroll" class="scroll">
        <main id="root">
          <div class="empty">
            <h3>还没有选中攻略</h3>
            <p class="sub">在顶部导航选择历史攻略，或先生成一个新的地点攻略。</p>
          </div>
        </main>
      </div>
    </section>
  </div>

  <script>
    (adsbygoogle = window.adsbygoogle || []).push({});

    (function adFallbackGuard(){
      const ad = document.getElementById("left-route-ad");
      const fallback = document.getElementById("left-route-ad-fallback");
      if(!ad || !fallback) return;

      function hasFilled(){
        const hasIframe = !!ad.querySelector("iframe");
        const h = ad.offsetHeight || 0;
        return hasIframe || h >= 80;
      }

      function refresh(){
        fallback.classList.toggle("show", !hasFilled());
      }

      setTimeout(refresh, 2500);
      setTimeout(refresh, 6000);
      const ob = new MutationObserver(refresh);
      ob.observe(ad, { childList: true, subtree: true, attributes: true });
    })();
  </script>

  <script>
    const T={1:{n:"海湾清晨"},2:{n:"城市博览"},3:{n:"霓虹夜行"},4:{n:"山林步调"},5:{n:"复古街区"},6:{n:"海港漫游"},7:{n:"艺文周末"},8:{n:"轻探险线"},9:{n:"自然疗愈"},10:{n:"都市效率"}};

    const hstrip=document.getElementById("hstrip");
    const hsearch=document.getElementById("hsearch");
    const hcount=document.getElementById("hcount");
    const htoggle=document.getElementById("htoggle");
    const hnav=document.getElementById("hnav");
    const nav=document.getElementById("nav");
    const root=document.getElementById("root");
    const scroll=document.getElementById("scroll");
    const statusEl=document.getElementById("status");
    const form=document.getElementById("form");
    const locationEl=document.getElementById("location");
    const daysEl=document.getElementById("days");
    const submit=document.getElementById("submit");
    const refresh=document.getElementById("refresh");
    const routePanelBody=document.getElementById("route-panel-body");

    let items=[];
    let activeKey="";
    let q="";
    let collapsed=false;
    let autoTimer=null;
    let autoIdx=0;
    let lastTouch=Date.now();
    let navHidden=false;
    let lastTop=0;
    let activeRouteDay=1;
    let currentRoutes=[];

    const s=(m,e)=>{statusEl.textContent=m||"";statusEl.className=e?"status err":"status"};
    const esc=v=>String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#39;");
    const tid=v=>{const n=Number(v);return Number.isInteger(n)&&n>=1&&n<=10?n:1};
    const li=a=>!Array.isArray(a)||!a.length?"<p class='sub'>暂无内容</p>":"<ul>"+a.map(x=>"<li>"+esc(x)+"</li>").join("")+"</ul>";

    const hit=()=>{lastTouch=Date.now();if(navHidden){navHidden=false;nav.classList.remove("hidden")}};
    const filtered=()=>{const k=q.trim().toLowerCase();if(!k)return items;return items.filter(i=>String(i.location||"").toLowerCase().includes(k)||String(i.key||"").toLowerCase().includes(k));};
    const syncCollapse=()=>{hnav.classList.toggle("collapsed",collapsed);htoggle.textContent=collapsed?"展开历史":"折叠历史";};

    function startAuto(){
      if(autoTimer)clearInterval(autoTimer);
      autoTimer=setInterval(()=>{
        if(collapsed)return;
        if(Date.now()-lastTouch<60000)return;
        const f=filtered();
        if(!f.length)return;
        autoIdx=(autoIdx+1)%f.length;
        const n=f[autoIdx];
        if(!n||n.key===activeKey)return;
        activeKey=n.key;
        renderHistory();
        renderGuide(n);
      },5000);
    }

    function reveal(){
      const nodes=[...document.querySelectorAll(".reveal")];
      nodes.forEach((n,i)=>n.style.setProperty("--d",`${(i%8)*45}ms`));
      if(!("IntersectionObserver" in window)){nodes.forEach(n=>n.classList.add("on"));return;}
      const ob=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("on");ob.unobserve(e.target)}}),{threshold:.14});
      nodes.forEach(n=>ob.observe(n));
    }

    function empty(){
      root.innerHTML="<div class='empty'><h3>还没有选中攻略</h3><p class='sub'>在顶部导航选择历史攻略，或先生成一个新的地点攻略。</p></div>";
      routePanelBody.innerHTML="<p class='sub'>还没有路线数据。</p>";
    }

    function fallbackRoutes(location,itinerary,days){
      const base=Array.isArray(itinerary)?itinerary:[];
      return Array.from({length:days}).map((_,idx)=>{
        const d=base[idx]||{};
        const day=idx+1;
        const station=`${location||"目的地"}高铁站`;
        const hotel=`${location||"目的地"}酒店`;
        const morning=String(d.morning||`${location||"目的地"}核心景点`).trim();
        const afternoon=String(d.afternoon||`${location||"目的地"}地标街区`).trim();
        const evening=String(d.evening||`${location||"目的地"}夜游区`).trim();
        return {
          day,
          title:String(d.theme||`Day ${day} 路线`).trim(),
          steps:[
            {from:station,to:hotel,transport:"地铁/公交",line:"",duration:"40分钟",note:"先办理入住"},
            {from:hotel,to:morning,transport:"地铁/打车",line:"",duration:"25分钟",note:"上午游览"},
            {from:morning,to:afternoon,transport:"地铁/公交",line:"",duration:"20分钟",note:"中午就近用餐"},
            {from:afternoon,to:evening,transport:"步行/地铁",line:"",duration:"20分钟",note:"晚间活动"},
            {from:evening,to:hotel,transport:"地铁/打车",line:"",duration:"30分钟",note:"返程休息"}
          ]
        };
      });
    }

    function normalizeRoutes(rec){
      const c=rec?.content||{};
      const itinerary=Array.isArray(c.itinerary)?c.itinerary:[];
      const days=Math.max(Number(rec?.days)||itinerary.length||1,1);
      const raw=Array.isArray(c.routes)?c.routes:[];
      const normalized=raw.map((r,idx)=>{
        const steps=Array.isArray(r?.steps)?r.steps.filter(step=>step&&step.from&&step.to):[];
        if(!steps.length)return null;
        return {
          day:Number(r.day)||idx+1,
          title:String(r.title||`Day ${idx+1} 路线`).trim(),
          steps:steps.map(step=>({
            from:String(step.from||""),
            to:String(step.to||""),
            transport:String(step.transport||"步行"),
            line:String(step.line||""),
            duration:String(step.duration||""),
            note:String(step.note||"")
          }))
        };
      }).filter(Boolean);
      return normalized.length?normalized:fallbackRoutes(rec?.location||"",itinerary,days);
    }

    function transportClass(transport){
      const t=String(transport||"").toLowerCase();
      if(t.includes("地铁")||t.includes("metro")||t.includes("subway")) return "t-metro";
      if(t.includes("公交")||t.includes("bus")) return "t-bus";
      if(t.includes("打车")||t.includes("出租")||t.includes("taxi")||t.includes("网约")) return "t-taxi";
      if(t.includes("步行")||t.includes("walk")) return "t-walk";
      if(t.includes("高铁")||t.includes("火车")||t.includes("rail")||t.includes("train")) return "t-train";
      return "t-other";
    }

    function renderRoutePanel(routes,activeDay){
      if(!Array.isArray(routes)||!routes.length){
        routePanelBody.innerHTML="<p class='sub'>暂无路线信息。</p>";
        return;
      }
      routePanelBody.innerHTML=routes.map(r=>{
        const active=Number(r.day)===Number(activeDay)?" active":"";
        const steps=Array.isArray(r.steps)?r.steps:[];
        return `<article class="route-day${active}" data-route-day="${esc(r.day)}"><div class="route-day-head">Day ${esc(r.day)} · ${esc(r.title||"交通路线")}</div>${steps.map((step,idx)=>`<div class="route-step"><div class="route-step-top">${idx+1}. ${esc(step.from)} → ${esc(step.to)}</div><div class="sub"><span class="transport-tag ${transportClass(step.transport)}">${esc(step.transport||"交通")}</span>${step.line?` · ${esc(step.line)}`:""}${step.duration?` · ${esc(step.duration)}`:""}${step.note?` · ${esc(step.note)}`:""}</div></div>`).join("")}</article>`;
      }).join("");
    }

    function setActiveRouteDay(day){
      activeRouteDay=Number(day)||1;
      renderRoutePanel(currentRoutes,activeRouteDay);
      root.querySelectorAll(".itinerary-day[data-day]").forEach(el=>{
        el.classList.toggle("active",Number(el.dataset.day)===activeRouteDay);
      });
    }

    function renderHistory(){
      if(!items.length){
        hcount.textContent="0 条";
        hstrip.innerHTML="<div class='sub'>暂无历史攻略，先生成一条吧。</div>";
        return;
      }
      const f=filtered();
      hcount.textContent=`${f.length} 条`;
      if(!f.length){
        hstrip.innerHTML="<div class='sub'>没有匹配到历史攻略。</div>";
        return;
      }
      autoIdx=Math.max(0,f.findIndex(i=>i.key===activeKey));
      hstrip.innerHTML=f.map(i=>{
        const active=i.key===activeKey?" active":"";
        const t=tid(i.templateId);
        const tm=T[t]?.n||"默认模板";
        const time=i.updatedAt?new Date(i.updatedAt).toLocaleString("zh-CN"):"未知时间";
        return `<article class="item${active}" data-key="${esc(i.key)}"><div class="ihead"><div class="ikey">${esc(i.key)}</div><button class="idel" data-del="${esc(i.key)}" type="button">删除</button></div><div class="isub">${esc(i.location||"未知地点")} · ${esc(String(i.days||"-"))} 天</div><div class="isub">模板 ${t} · ${esc(tm)}</div><div class="isub">${esc(time)}</div></article>`;
      }).join("");

      hstrip.querySelectorAll(".item").forEach(node=>{
        node.addEventListener("click",()=>{
          hit();
          const rec=items.find(i=>i.key===node.dataset.key);
          if(!rec)return;
          activeKey=rec.key;
          renderHistory();
          renderGuide(rec);
        });
        node.addEventListener("mouseenter",hit);
      });

      hstrip.querySelectorAll(".idel").forEach(btn=>btn.addEventListener("click",e=>{
        e.stopPropagation();
        const key=btn.dataset.del||"";
        if(key)delHistory(key);
      }));
    }

    function renderGuide(rec){
      if(!rec||!rec.content){empty();return;}
      const c=rec.content;
      const itinerary=Array.isArray(c.itinerary)?c.itinerary:[];
      const budget=c.budget||{};
      const tags=Array.isArray(c.tags)?c.tags:[];
      const routes=normalizeRoutes(rec);
      const t=tid(rec.templateId);
      const cache=rec.source==="cache";

      root.innerHTML=`<div class="guide"><div class="shell"><div class="ban reveal"><span class="badge">模板 ${t} · ${esc(T[t]?.n||"默认")}</span><span class="badge">${cache?"缓存命中":"新生成并入库"}</span></div><div class="layout"><section class="gcard reveal"><div class="tags"><span class="tag">${esc(rec.key)}</span><span class="tag">${esc(c.bestSeason||"四季皆宜")}</span><span class="tag">${esc(c.travelStyle||"自由行")}</span></div><h2 class="title">${esc(c.title||(rec.key+"旅游攻略"))}</h2><p class="sub">${esc(c.summary||"已生成旅游攻略。")}</p><div class="g2"><article class="mini reveal"><h4>出发前提醒</h4><p>${esc(c.prep||"建议提前确认天气、交通和预约信息。")}</p></article><article class="mini reveal"><h4>适合人群</h4><p>${esc(c.audience||"适合第一次去、想快速安排行程的人群。")}</p></article></div><div class="tags">${tags.length?tags.map(x=>`<span class="tag">${esc(x)}</span>`).join(""):"<span class='sub'>暂无标签</span>"}</div></section><section class="gcard reveal"><h3 style="margin:0 0 8px;">每日行程（点击高亮左侧路线）</h3><div class="days">${itinerary.map((d,i)=>`<article class="day itinerary-day reveal" data-day="${i+1}"><h4>Day ${i+1} · ${esc(d.theme||"行程安排")}</h4><div class="sch">${["morning","afternoon","evening"].map(k=>`<div class="slot"><strong>${k==="morning"?"上午":k==="afternoon"?"下午":"晚上"}</strong><div>${esc(d[k]||"自由活动")}</div></div>`).join("")}</div></article>`).join("")||"<div class='sub'>暂无详细行程</div>"}</div></section><section class="gcard reveal"><h3 style="margin:0 0 8px;">预算与建议</h3><div class="bud"><article class="mini reveal"><h4>交通</h4><strong>${esc(budget.transport||"-")}</strong></article><article class="mini reveal"><h4>住宿</h4><strong>${esc(budget.hotel||"-")}</strong></article><article class="mini reveal"><h4>餐饮</h4><strong>${esc(budget.food||"-")}</strong></article><article class="mini reveal"><h4>门票与杂费</h4><strong>${esc(budget.misc||"-")}</strong></article></div><div class="g2"><article class="mini reveal"><h4>必吃推荐</h4>${li(c.foods)}</article><article class="mini reveal"><h4>住宿建议</h4>${li(c.hotels)}</article><article class="mini reveal"><h4>贴士</h4>${li(c.tips)}</article></div></section></div></div></div>`;
      currentRoutes=routes;
      reveal();
      const firstDay=routes[0]?.day||1;
      setActiveRouteDay(firstDay);
      root.querySelectorAll(".itinerary-day[data-day]").forEach(el=>{
        el.addEventListener("click",()=>{
          hit();
          setActiveRouteDay(Number(el.dataset.day));
        });
      });
    }

    async function j(url,opt){
      const r=await fetch(url,opt);
      const d=await r.json().catch(()=>({}));
      if(!r.ok)throw new Error(d.error||"请求失败");
      return d;
    }

    async function load(){
      try {
        s("正在读取 MongoDB 历史...");
        const d=await j("/api/guides");
        items=Array.isArray(d.items)?d.items:[];
        items.sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
        if(!activeKey&&items.length)activeKey=items[0].key;
        const active=items.find(i=>i.key===activeKey);
        if(active)renderGuide(active);else empty();
        renderHistory();
        s(items.length?"历史已同步。":"暂无历史攻略。");
      } catch (e) {
        console.error(e);
        s(e.message||"读取历史失败",1);
      }
    }

    async function delHistory(k){
      hit();
      const pwd=window.prompt("请输入删除密码（DELETE_PASSWORD）");
      if(pwd===null)return;
      try {
        s("正在删除...");
        const r=await j(`/api/guides/${encodeURIComponent(k)}`,{method:"DELETE",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pwd})});
        if(!r.deleted){s("未找到可删除记录。",1);await load();return;}
        items=items.filter(i=>i.key!==k);
        if(activeKey===k){const f=filtered()[0]||items[0];activeKey=f?f.key:"";if(f)renderGuide(f);else empty();}
        renderHistory();
        s("删除成功。");
      } catch (e) {
        console.error(e);
        s(e.message||"删除失败",1);
      }
    }

    async function submitGuide(ev){
      ev.preventDefault();
      hit();
      const location=locationEl.value.trim();
      const days=Number(daysEl.value);
      if(!location){s("请先输入旅游地点。",1);locationEl.focus();return;}
      submit.disabled=true;
      s("正在生成攻略，命中缓存会直接返回...");
      try {
        const d=await j("/api/guides",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({location,days})});
        const rec=d.item;
        activeKey=rec.key;
        const idx=items.findIndex(i=>i.key===rec.key);
        if(idx>=0)items.splice(idx,1,rec);else items.unshift(rec);
        items.sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
        renderHistory();
        renderGuide(rec);
        s(d.cached?`命中缓存，沿用模板 ${tid(rec.templateId)}。`:`已生成并入库，随机模板 ${tid(rec.templateId)} 已固定。`);
      } catch (e) {
        console.error(e);
        s(e.message||"生成失败",1);
      } finally {
        submit.disabled=false;
      }
    }

    function bindRightScrollHideTop(){
      scroll.addEventListener("scroll",()=>{
        const t=scroll.scrollTop;
        const down=t>lastTop;
        const far=t>36;
        if(down&&far){navHidden=true;nav.classList.add("hidden");}
        else{navHidden=false;nav.classList.remove("hidden");}
        lastTop=t;
      },{passive:true});
    }

    form.addEventListener("submit",submitGuide);
    refresh.addEventListener("click",()=>{hit();load();});
    hsearch.addEventListener("input",()=>{hit();q=hsearch.value||"";renderHistory();});
    htoggle.addEventListener("click",()=>{hit();collapsed=!collapsed;syncCollapse();});
    document.addEventListener("visibilitychange",()=>{if(!document.hidden)hit();});

    bindRightScrollHideTop();
    syncCollapse();
    startAuto();
    load();
  </script>
</body>
</html>
