    $("submit").onclick = () => generateGuide(false);
    $("regenerate").onclick = () => generateGuide(true);
    $("export-md").onclick = exportMd;
    initFormUi();
    $("reload").onclick = load;
    $("search").oninput = () => { S.q = $("search").value || ""; renderHistStrip(); };
    window.addEventListener("hashchange", applyHash);
    window.addEventListener("resize", () => { S.charts.forEach((chart) => { try { chart.resize(); } catch {} }); if (S.map) { try { S.map.invalidateSize(); } catch {} } });
    (async () => { await loadConfig(); await load(); })();
  </script>
</body>
</html>
